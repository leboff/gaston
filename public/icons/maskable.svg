<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Gaston">
  <!-- Full-bleed background so the maskable safe-area crop never shows gaps. -->
  <rect width="512" height="512" fill="#0a0a0a"/>
  <!-- Glyph kept inside the ~80% safe zone (center 410px). -->
  <text x="50%" y="50%" dy="0.02em" text-anchor="middle" dominant-baseline="central"
        font-family="Geist, Arial, Helvetica, sans-serif" font-size="240" font-weight="700"
        fill="#fcd34d">G</text>
  <rect x="151" y="356" width="210" height="16" rx="8" fill="#d97706" opacity="0.7"/>
</svg>
